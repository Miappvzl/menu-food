        body { background-color: #050505; color: #E5E5E5; -webkit-tap-highlight-color: transparent; }

        .check-box input:checked + div { background-color: #FF4500; border-color: #FF4500; }
        
        .slide-up { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    <script>
        // --- CORE STATE ---
        let cart = [];
        let modalState = { product: null, qty: 1, mods: [] };
        let activeCat = 'all';

        // --- INIT ---
        document.addEventListener("DOMContentLoaded", () => {
            initSystem();
            renderCategories();
            renderGrid();
            
            document.getElementById("search-input").addEventListener("input", (e) => {
                renderGrid(activeCat, e.target.value.toLowerCase());
            });
        });

        function initSystem() {
            document.getElementById("hero-bg").src = DATA.store.hero;
            document.getElementById("footer-logo").src = DATA.store.logo;
            document.getElementById("header-logo").src = DATA.store.logo;
            
            // Footer Info
            document.getElementById("footer-address").innerText = DATA.store.address;
            document.getElementById("btn-map").href = `https://www.google.com/maps/place/5295%2BHR+Samy's+Food,+Valencia+2001,+Carabobo/@10.1689052,-67.9902661,16z/data=!4m6!3m5!1s0x8e80672a02a40829:0xf95e04297b70d1ce!8m2!3d10.1689052!4d-67.9902661!16s%2Fg%2F11sp0756m4?g_ep=Eg1tbF8yMDI2MDEyOF8xIOC7DCoASAJQAQ%3D%3D{encodeURIComponent(DATA.store.address)}`;
            document.getElementById("btn-insta").href = DATA.store.instagram;
        }

        // --- RENDERING ---
        function renderCategories() {
            const container = document.getElementById("cat-scroll");
            container.innerHTML = DATA.categories.map(c => `
                <button onclick="setCategory('${c.id}')" id="cat-${c.id}" 
                    class="tab-item ${c.id === 'all' ? 'tab-active' : 'tab-inactive'} 
                    h-9 px-4 rounded-lg flex items-center gap-2 border text-xs font-bold uppercase tracking-wider min-w-max select-none">
                    <span class="${c.id === 'all' ? 'text-white' : 'opacity-70'}">${c.icon}</span>
                    <span class="pt-0.5">${c.name}</span>
                </button>
            `).join("");
        }

        function setCategory(id) {
            activeCat = id;
            document.querySelectorAll('.tab-item').forEach(el => {
                el.classList.replace('tab-active', 'tab-inactive');
            });
            const activeBtn = document.getElementById(`cat-${id}`);
            activeBtn.classList.replace('tab-inactive', 'tab-active');
            activeBtn.querySelector('span').classList.remove('opacity-70');
            
            document.getElementById("search-input").value = "";
            renderGrid(id);
        }

        function renderGrid(cat = "all", term = "") {
            const grid = document.getElementById("grid-products");
            const empty = document.getElementById("empty-msg");
            
            const filtered = DATA.products.filter(p => {
                const matchCat = cat === "all" || p.cat === cat;
                const matchTerm = p.name.toLowerCase().includes(term);
                return matchCat && matchTerm;
            });

            document.getElementById("count-label").innerText = `${filtered.length} ITEMS`;

            if(filtered.length === 0) {
                grid.innerHTML = "";
                empty.classList.remove("hidden");
            } else {
                empty.classList.add("hidden");
                grid.innerHTML = filtered.map(p => `
                    <div onclick="openProductModal(${p.id})" class="card-premium rounded-xl p-3 flex gap-3 cursor-pointer group relative overflow-hidden active:scale-[0.98] transition-transform">
                        <div class="w-20 h-20 bg-[#151515] rounded-lg overflow-hidden flex-shrink-0">
                            <img src="${p.img}" class="w-full h-full object-cover opacity-90 group-hover:opacity-100 transition-opacity">
                        </div>
                        <div class="flex flex-col justify-center flex-1">
                            <div class="flex justify-between items-start mb-1">
                                <h4 class="font-display text-lg text-white leading-none">${p.name}</h4>
                                <span class="font-display text-brand text-lg">${DATA.store.currency}${p.price.toFixed(2)}</span>
                            </div>
                            <p class="text-zinc-500 text-xs line-clamp-1 mb-2 font-medium">${p.desc}</p>
                            ${p.hot ? '<span class="text-[9px] font-bold text-orange-400 uppercase tracking-widest">★ Popular</span>' : ''}
                        </div>
                    </div>
                `).join("");
            }
        }

        // --- PRODUCT MODAL ---
        function openProductModal(id) {
            const p = DATA.products.find(x => x.id === id);
            modalState = { product: p, qty: 1, mods: [] };
            
            document.getElementById("pm-img").src = p.img;
            document.getElementById("pm-title").innerText = p.name;
            document.getElementById("pm-desc").innerText = p.desc;
            document.getElementById("pm-qty").innerText = "1";
            
            const modContainer = document.getElementById("pm-modifiers");
            modContainer.innerHTML = DATA.modifiers.map(m => `
                <label class="check-box flex items-center justify-between bg-[#151515] p-3 rounded-lg border border-void-border cursor-pointer active:bg-[#202020]">
                    <div class="flex items-center gap-3">
                        <input type="checkbox" class="hidden" onchange="toggleMod('${m.id}')">
                        <div class="w-4 h-4 rounded border border-zinc-600 flex items-center justify-center transition-colors">
                            <svg class="w-2.5 h-2.5 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><polyline points="20 6 9 17 4 12"></polyline></svg>
                        </div>
                        <span class="text-zinc-300 text-xs font-bold uppercase tracking-wider">${m.name}</span>
                    </div>
                    <span class="text-white text-xs font-bold">+${DATA.store.currency}${m.price.toFixed(2)}</span>
                </label>
            `).join("");

            updatePmButton();

            const modal = document.getElementById("product-modal");
            modal.classList.remove("hidden");
            document.body.style.overflow = "hidden";
            setTimeout(() => {
                document.getElementById("pm-backdrop").classList.remove("opacity-0");
                document.getElementById("pm-sheet").classList.remove("translate-y-full");
            }, 10);
        }

        function closeProductModal() {
            document.getElementById("pm-backdrop").classList.add("opacity-0");
            document.getElementById("pm-sheet").classList.add("translate-y-full");
            setTimeout(() => {
                document.getElementById("product-modal").classList.add("hidden");
                document.body.style.overflow = "auto";
            }, 300);
        }

        function toggleMod(id) {
            const m = DATA.modifiers.find(x => x.id === id);
            const idx = modalState.mods.indexOf(m);
            if(idx > -1) modalState.mods.splice(idx, 1);
            else modalState.mods.push(m);
            updatePmButton();
        }

        function modQty(d) {
            if(modalState.qty + d < 1) return;
            modalState.qty += d;
            document.getElementById("pm-qty").innerText = modalState.qty;
            updatePmButton();
        }

        function updatePmButton() {
            const unitPrice = modalState.product.price + modalState.mods.reduce((a,b)=>a+b.price, 0);
            const total = unitPrice * modalState.qty;
            document.getElementById("pm-price-btn").innerText = `${DATA.store.currency}${total.toFixed(2)}`;
        }

        function addToCart() {
            const { product, qty, mods } = modalState;
            const unitPrice = product.price + mods.reduce((a,b)=>a+b.price, 0);
            
            const existing = cart.find(i => i.id === product.id && JSON.stringify(i.mods) === JSON.stringify(mods));
            if(existing) existing.qty += qty;
            else cart.push({ ...product, qty, mods, unitPrice });

            updateDock();
            closeProductModal();
            
            const t = document.getElementById("toast");
            t.classList.remove("opacity-0", "translate-y-4");
            if(navigator.vibrate) navigator.vibrate(50);
            setTimeout(() => t.classList.add("opacity-0", "translate-y-4"), 2000);
        }

        // --- CHECKOUT LOGIC ---
        function openCheckout() {
            if(cart.length === 0) return;
            renderCheckoutList();
            
            const modal = document.getElementById("checkout-modal");
            modal.classList.remove("hidden");
            document.body.style.overflow = "hidden";
            setTimeout(() => {
                document.getElementById("cm-backdrop").classList.remove("opacity-0");
                document.getElementById("cm-sheet").classList.remove("translate-y-full");
            }, 10);
        }

        function closeCheckout() {
            document.getElementById("cm-backdrop").classList.add("opacity-0");
            document.getElementById("cm-sheet").classList.add("translate-y-full");
            setTimeout(() => {
                document.getElementById("checkout-modal").classList.add("hidden");
                document.body.style.overflow = "auto";
            }, 300);
        }

        function renderCheckoutList() {
            const list = document.getElementById("checkout-list");
            let total = 0;
            
            list.innerHTML = cart.map((item, idx) => {
                const itemTotal = item.unitPrice * item.qty;
                total += itemTotal;
                return `
                <div class="flex gap-4 border-b border-white/5 pb-4 last:border-0">
                    <div class="w-16 h-16 bg-[#1A1A1A] rounded-lg overflow-hidden flex-shrink-0">
                        <img src="${item.img}" class="w-full h-full object-cover">
                    </div>
                    <div class="flex-1">
                        <div class="flex justify-between items-start">
                            <h4 class="font-display text-lg text-white">${item.name}</h4>
                            <span class="font-bold text-sm text-white">${DATA.store.currency}${itemTotal.toFixed(2)}</span>
                        </div>
                        <div class="text-xs text-zinc-500 mb-2">
                            ${item.qty}x ${DATA.store.currency}${item.unitPrice.toFixed(2)}
                            ${item.mods.length ? ' • ' + item.mods.map(m=>m.name).join(', ') : ''}
                        </div>
                        <button onclick="removeFromCart(${idx})" class="text-xs text-red-500 font-bold uppercase tracking-wider flex items-center gap-1 hover:text-red-400">
                            ${ICONS.trash} Eliminar
                        </button>
                    </div>
                </div>`;
            }).join("");

            document.getElementById("cm-subtotal").innerText = `${DATA.store.currency}${total.toFixed(2)}`;
            document.getElementById("cm-total").innerText = `${DATA.store.currency}${total.toFixed(2)}`;
        }

        function removeFromCart(idx) {
            cart.splice(idx, 1);
            if(cart.length === 0) {
                closeCheckout();
                updateDock();
            } else {
                renderCheckoutList();
                updateDock();
            }
        }

        function updateDock() {
            const dock = document.getElementById("cart-dock");
            const total = cart.reduce((acc, i) => acc + (i.unitPrice * i.qty), 0);
            const count = cart.reduce((acc, i) => acc + i.qty, 0);

            document.getElementById("dock-total").innerText = `${DATA.store.currency}${total.toFixed(2)}`;
            document.getElementById("dock-count").innerText = count;

            if(cart.length > 0) dock.style.transform = "translate(-50%, 0)";
            else dock.style.transform = "translate(-50%, 150%)";
        }

        function sendToWhatsApp() {
            let msg = `*NUEVO PEDIDO - ${DATA.store.name}*\n\n`;
            let total = 0;
            
            cart.forEach(item => {
                const sub = item.unitPrice * item.qty;
                total += sub;
                msg += `▪️ *${item.qty}x ${item.name}* ($${sub.toFixed(2)})\n`;
                if(item.mods.length) msg += `   _Extras: ${item.mods.map(m=>m.name).join(', ')}_\n`;
                msg += `\n`;
            });

            msg += `--------------------------------\n`;
            msg += `*TOTAL FINAL: $${total.toFixed(2)}*\n`;
            msg += `\n📍 *Dirección de envío:* (Escribe aquí)`;

            window.open(`https://wa.me/${DATA.store.phone}?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
</body>
</html>
